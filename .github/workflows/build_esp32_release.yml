name: build-esp32-release

# 编译私有库 ms-esp32-s3-box 的 ms-helper 固件，按发布规范打包，
# 并发布到公开库固定的 esp32 tag（https://github.com/xylplm/media-saber-public/releases/tag/esp32）。
# 每次运行用日期版本号作为 release 标题，方便区分构建批次；tag 始终为 esp32。
#
# 需在公开库配置 Secrets：
#   PERSON_ACCESS_TOKEN  能拉取私有库 ms-esp32-s3-box 的 PAT（同时用于发布 release）

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # Job 1：在 espressif/idf 容器里编译 + 打包，产出 artifact
  # ------------------------------------------------------------------
  build:
    name: Build & package
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout private ESP32 repo
        uses: actions/checkout@v6
        with:
          repository: xylplm/ms-esp32-s3-box
          path: ms-esp32-s3-box
          ref: main
          token: ${{ secrets.PERSON_ACCESS_TOKEN }}

      - name: Build and merge ms-helper
        shell: bash
        run: |
          cd ms-esp32-s3-box
          source $IDF_PATH/export.sh
          # release.py 完成 set-target + build + merge-bin，
          # 产物 build/merged-binary.bin（含 bootloader+分区+ota+app+assets）
          python scripts/release.py ms-helper --name ms-helper

      # ============================================================
      # 按社区发布规范打包：合并包 + 分散包
      # ============================================================
      - name: Package release archives
        shell: bash
        run: |
          set -e
          cd ms-esp32-s3-box
          mkdir -p release/merged release/split

          # ---------- 合并固件包（单文件，烧到 0x0） ----------
          cp build/merged-binary.bin release/merged/media-saber-esp32s3-ms-helper.bin
          cat > release/merged/README.txt <<'EOF'
          Media Saber ESP32-S3 桌面小助手固件（合并版）
          ==============================================

          本压缩包内含一个合并固件文件，烧录到地址 0x0 即可，无需手动指定分区地址。

          文件
          ----
          media-saber-esp32s3-ms-helper.bin   合并固件（bootloader + 分区表 + OTA 数据 + 应用 + 资源）

          命令行烧录（esptool.py）
          ------------------------
              pip install esptool
              esptool.py --chip esp32s3 --port COMx --baud 921600 write_flash -z 0x0 media-saber-esp32s3-ms-helper.bin

          图形化烧录（Flash Download Tool）
          ---------------------------------
          - 芯片选 ESP32-S3，勾选地址 0x0，选择 media-saber-esp32s3-ms-helper.bin
          - SPI Speed: 80MHz / SPI Mode: DIO / FlashSize: 16MB

          完整教程
          --------
          参见 Media Saber Wiki：ESP32 桌面小助手 / 固件烧录教程
          https://github.com/xylplm/media-saber-public/releases/tag/esp32
          EOF

          # ---------- 分散固件包（5 个分区固件 + flash_args） ----------
          cp build/bootloader/bootloader.bin            release/split/
          cp build/partition_table/partition-table.bin release/split/
          cp build/ota_data_initial.bin                release/split/
          cp build/xiaozhi.bin                         release/split/
          cp build/generated_assets.bin                release/split/
          cat > release/split/README.txt <<'EOF'
          Media Saber ESP32-S3 桌面小助手固件（分散版）
          ============================================

          本压缩包内含 5 个分区固件，按各自地址分别烧录，适合需要单独刷新某个分区的用户。

          文件与地址
          ----------
              地址        文件
              0x0         bootloader.bin
              0x8000      partition-table.bin
              0xd000      ota_data_initial.bin
              0x20000     xiaozhi.bin
              0x800000    generated_assets.bin

          命令行烧录（esptool.py，使用 flash_args 一次性烧录）
          ---------------------------------------------------
              pip install esptool
              esptool.py --chip esp32s3 --port COMx --baud 921600 write_flash -z @flash_args

          或分条写入：
              esptool.py --chip esp32s3 --port COMx --baud 921600 write_flash -z `
                0x0 bootloader.bin `
                0x8000 partition-table.bin `
                0xd000 ota_data_initial.bin `
                0x20000 xiaozhi.bin `
                0x800000 generated_assets.bin

          图形化烧录（Flash Download Tool）
          ---------------------------------
          按上面的地址表逐行添加文件，全部勾选后开始烧录。
          SPI Speed: 80MHz / SPI Mode: DIO / FlashSize: 16MB

          完整教程
          --------
          参见 Media Saber Wiki：ESP32 桌面小助手 / 固件烧录教程
          https://github.com/xylplm/media-saber-public/releases/tag/esp32
          EOF

          # flash_args：解压后同级目录可直接 @flash_args
          {
            echo "--flash_mode dio --flash_freq 80m --flash_size 16MB"
            echo "0x0 bootloader.bin"
            echo "0x8000 partition-table.bin"
            echo "0xd000 ota_data_initial.bin"
            echo "0x20000 xiaozhi.bin"
            echo "0x800000 generated_assets.bin"
          } > release/split/flash_args

          ( cd release/merged && zip -r ../media-saber-esp32s3-ms-helper-merged.zip . )
          ( cd release/split  && zip -r ../media-saber-esp32s3-ms-helper-split.zip . )

          echo "=== packaged ==="
          ls -la release/*.zip

      - name: Upload release archives
        uses: actions/upload-artifact@v7
        with:
          name: esp32-release-archives
          path: |
            ms-esp32-s3-box/release/media-saber-esp32s3-ms-helper-merged.zip
            ms-esp32-s3-box/release/media-saber-esp32s3-ms-helper-split.zip
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Job 2：在普通 runner（自带 gh CLI）上发布 release 到 esp32 tag
  # ------------------------------------------------------------------
  release:
    name: Publish to esp32 tag
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout public repo（取 release notes 模板）
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: esp32-release-archives
          path: release

      - name: Generate build version
        id: ver
        run: |
          # 版本号：ESP32_YYYYMMDDHHMM（北京时间）
          VERSION="ESP32_$(TZ='Asia/Shanghai' date +'%Y%m%d%H%M')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build version: $VERSION"

      - name: Generate release notes
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # 模板统一维护在 .github/workflows/esp32_release_notes.md，
          # 用 sed 替换版本号与构建时间占位符，避免 heredoc 缩进问题
          BUILD_TIME="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          sed \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__BUILD_TIME__|${BUILD_TIME}|g" \
            .github/workflows/esp32_release_notes.md > release_notes.md
          echo "=== release notes ==="
          cat release_notes.md

      - name: Delete previous esp32 release (cleanup tag)
        env:
          GH_TOKEN: ${{ secrets.PERSON_ACCESS_TOKEN }}
        run: |
          # esp32 是固定 tag，每次发布前删除旧 release 与 tag，由下一步重建
          gh release delete esp32 --repo "${{ github.repository }}" --yes --cleanup-tag || true

      - name: Create GitHub Release on esp32 tag
        env:
          GH_TOKEN: ${{ secrets.PERSON_ACCESS_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          gh release create esp32 \
            release/media-saber-esp32s3-ms-helper-merged.zip \
            release/media-saber-esp32s3-ms-helper-split.zip \
            --title "${VERSION}" \
            --notes-file release_notes.md \
            --repo "${{ github.repository }}"
