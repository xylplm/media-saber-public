name: build-csreport-release

on:
  workflow_dispatch:

jobs:
  generate-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v6

      - name: Generate csreport version
        run: |
          echo "CSREPORT_$(date -d '+8 hours' +'%Y%m%d%H%M')" > version_number
          echo "version=$(cat version_number)" >> $GITHUB_ENV

      - name: Upload Version Artifact
        uses: actions/upload-artifact@v7
        with:
          name: version
          path: version_number

  build-and-release:
    runs-on: ubuntu-latest
    needs: [ generate-version ]
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Checkout full backend repo
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.REPOSITORY_BACK }}
          path: ./msaber-back
          ref: main
          token: ${{ secrets.PERSON_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Download Version Artifact
        uses: actions/download-artifact@v8
        with:
          name: version

      - name: Read Version
        run: echo "version=$(cat version_number)" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./msaber-back/go.mod
          cache: true
          cache-dependency-path: ./msaber-back/go.sum

      - name: Download dependencies
        run: |
          cd msaber-back
          go mod download

      - name: Build csreport binaries
        run: |
          cd msaber-back
          chmod +x ./csreport/build.sh
          ./csreport/build.sh

      - name: Package csreport artifacts
        run: |
          mkdir -p release/linux-amd64
          mkdir -p release/linux-arm64
          mkdir -p release/windows-amd64

          cp msaber-back/csreport/dist/csreport-linux-amd64 release/linux-amd64/
          cp msaber-back/csreport/dist/csreport-linux-arm64 release/linux-arm64/
          cp msaber-back/csreport/dist/csreport-windows-amd64.exe release/windows-amd64/

          cp msaber-back/csreport/README.md release/README.md

          cd release
          tar -czvf csreport-linux-amd64.tar.gz linux-amd64 README.md
          tar -czvf csreport-linux-arm64.tar.gz linux-arm64 README.md
          zip -r csreport-windows-amd64.zip windows-amd64 README.md

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: csreport-release-archives
          path: |
            release/csreport-linux-amd64.tar.gz
            release/csreport-linux-arm64.tar.gz
            release/csreport-windows-amd64.zip

      - name: Generate release notes
        run: |
          cat > release_notes.md << 'EOF'
          # CSReport 文件 Hash 上报脚本

          该 Release 包含：

          - `csreport-linux-amd64.tar.gz`
          - `csreport-linux-arm64.tar.gz`
          - `csreport-windows-amd64.zip`

          ## 如何使用

          必填参数：

          - `--email`  你的MS认证邮箱
          - `--slogan`  你的MS认证口令
          - `--driver-name`   上传网盘驱动 一般默认 115 Open 即可
          - `--folder`   你需要扫描的媒体文件夹目录  推荐削刮前的文件夹，避免上报的名称不完整
          - `--ms-url`（也可用环境变量 `CSREPORT_MS_URL`）  你的MS服务地址，上报需要连接到你的MS服务
          - `--ms-api-key`（也可用环境变量 `CSREPORT_MS_API_KEY`） 你的MS服务 API Key，上报需要连接到你的MS服务

          可选参数：

          - `--db-path`（默认：二进制同级目录下 `data/csreport.db`）

          Linux 运行示例：

          ```bash
          ./csreport-linux-amd64 \
            --email your@email.com \
            --slogan your-slogan \
            --driver-name "115 Open" \
            --folder /path/to/media \
            --ms-url http://127.0.0.1:22698 \
            --ms-api-key your-api-key
          ```

          Linux arm64 运行示例：

          ```bash
          ./csreport-linux-arm64 \
            --email your@email.com \
            --slogan your-slogan \
            --driver-name "115 Open" \
            --folder /path/to/media \
            --ms-url http://127.0.0.1:22698 \
            --ms-api-key your-api-key
          ```

          Windows PowerShell 运行示例：

          ```powershell
          .\csreport-windows-amd64.exe `
            --email your@email.com `
            --slogan "your-slogan" `
            --driver-name "115 Open" `
            --folder "D:\media\test" `
            --ms-url "http://127.0.0.1:22698" `
            --ms-api-key "your-api-key" `
            --db-path "D:\csreport\data\csreport.db"
          ```

          更多参数说明请查看包内 `README.md`。
          EOF

      - name: Create GitHub Release and Upload Assets
        env:
          GH_TOKEN: ${{ secrets.PERSON_ACCESS_TOKEN }}
        run: |
          gh release create "${{ env.version }}" \
            release/csreport-linux-amd64.tar.gz \
            release/csreport-linux-arm64.tar.gz \
            release/csreport-windows-amd64.zip \
            --title="${{ env.version }}" \
            --notes-file release_notes.md \
            --repo="${{ github.repository }}"