name: build-browser-extension-release

# 编译私有库 media-saber-extension（WXT 多浏览器分支），按发布规范打包，
# 并发布到公开库固定的 browser-extension tag
# （https://github.com/xylplm/media-saber-public/releases/tag/browser-extension）。
# 每次运行用日期版本号作为 release 标题，方便区分构建批次；tag 始终为 browser-extension，
# 发布前会删除旧 release 与 tag，只保留最新一个版本。
#
# 产物覆盖：
#   Chrome / Edge —— 各 3 种格式：.zip（解压加载）/ .crx（打包签名）/ .crx.zip（规避 .crx 直链下载拦截）
#   Firefox(MV2) / Firefox(MV3) / Safari —— 各 1 种 .zip
# Chrome/Edge 的 .crx 使用扩展仓库内 pem/dev_build.pem 签名（随私有源码一起签出）。
#
# 需在公开库配置 Secrets：
#   PERSON_ACCESS_TOKEN  能拉取私有库 media-saber-extension 的 PAT（同时用于发布 release）

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "扩展仓库要构建的分支 / tag / commit（默认 WXT 多浏览器分支）"
        required: false
        default: "master"

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # Job 1：拉取私有扩展源码，用 WXT 一次性构建 + 打包全部浏览器，产出 artifact
  # ------------------------------------------------------------------
  build:
    name: Build & package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private extension repo
        uses: actions/checkout@v6
        with:
          repository: xylplm/media-saber-extension
          path: media-saber-extension
          ref: ${{ inputs.ref }}
          token: ${{ secrets.PERSON_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: media-saber-extension/package-lock.json

      - name: Install dependencies
        run: |
          cd media-saber-extension
          npm ci

      # ============================================================
      # WXT 一次性构建并打包全部浏览器：chrome / edge / firefox / firefox-mv3 / safari
      # zip:all 会先 compile（wxt prepare + vue-tsc --noEmit）再逐个 zip
      # 产物输出在 .output/*.zip
      # ============================================================
      - name: Build & zip all browsers
        run: |
          cd media-saber-extension
          npm run zip:all
          echo "=== zip artifacts ==="
          ls -la .output/*.zip

      # ============================================================
      # 生成面向用户的稳定文件名（固定 tag 只保留一个版本，不在文件名中带版本号）
      # Chrome / Edge 各提供：原始 zip、crx、crx.zip 三种格式。
      # ============================================================
      - name: Package user-friendly archives
        shell: bash
        run: |
          set -e
          cd media-saber-extension
          mkdir -p release

          # WXT zip：解压后可在扩展管理页通过“加载已解压的扩展程序”安装
          cp .output/*-chrome-mv3.zip        release/media-saber-tools-chrome.zip
          cp .output/*-edge-mv3.zip          release/media-saber-tools-edge.zip
          cp .output/*-firefox-mv2.zip       release/media-saber-tools-firefox.zip
          cp .output/*-firefox-mv3.zip       release/media-saber-tools-firefox-mv3.zip
          cp .output/*-safari-mv2.zip        release/media-saber-tools-safari.zip

          # CRX3：使用扩展项目提供的开发签名密钥打包 Chrome / Edge 版本。
          # 同一密钥保证扩展 ID 稳定；crx.zip 用于规避部分浏览器拦截 .crx 直链下载。
          npx --yes crx3@2.0.0 \
            -p pem/dev_build.pem \
            -o release/media-saber-tools-chrome.crx \
            .output/chrome-mv3
          npx --yes crx3@2.0.0 \
            -p pem/dev_build.pem \
            -o release/media-saber-tools-edge.crx \
            .output/edge-mv3
          zip -j release/media-saber-tools-chrome.crx.zip release/media-saber-tools-chrome.crx
          zip -j release/media-saber-tools-edge.crx.zip release/media-saber-tools-edge.crx

          echo "=== release artifacts ==="
          ls -la release/

      - name: Upload release archives
        uses: actions/upload-artifact@v7
        with:
          name: browser-extension-release-archives
          path: |
            media-saber-extension/release/media-saber-tools-chrome.zip
            media-saber-extension/release/media-saber-tools-chrome.crx
            media-saber-extension/release/media-saber-tools-chrome.crx.zip
            media-saber-extension/release/media-saber-tools-edge.zip
            media-saber-extension/release/media-saber-tools-edge.crx
            media-saber-extension/release/media-saber-tools-edge.crx.zip
            media-saber-extension/release/media-saber-tools-firefox.zip
            media-saber-extension/release/media-saber-tools-firefox-mv3.zip
            media-saber-extension/release/media-saber-tools-safari.zip
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Job 2：在普通 runner（自带 gh CLI）上发布 release 到 browser-extension tag
  # ------------------------------------------------------------------
  release:
    name: Publish to browser-extension tag
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout public repo（取 release notes 模板）
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: browser-extension-release-archives
          path: release

      - name: Generate build version
        id: ver
        run: |
          # 版本号：EXT_YYYYMMDDHHMM（北京时间）
          VERSION="EXT_$(TZ='Asia/Shanghai' date +'%Y%m%d%H%M')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build version: $VERSION"

      - name: Generate release notes
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # 模板统一维护在 .github/workflows/browser_extension_release_notes.md，
          # 用 sed 替换版本号与构建时间占位符，避免 heredoc 缩进问题
          BUILD_TIME="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          sed \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__BUILD_TIME__|${BUILD_TIME}|g" \
            .github/workflows/browser_extension_release_notes.md > release_notes.md
          echo "=== release notes ==="
          cat release_notes.md

      - name: Delete previous browser-extension release (cleanup tag)
        env:
          GH_TOKEN: ${{ secrets.PERSON_ACCESS_TOKEN }}
        run: |
          # browser-extension 是固定 tag，每次发布前删除旧 release 与 tag，由下一步重建
          # 只保留一个最新版本
          gh release delete browser-extension --repo "${{ github.repository }}" --yes --cleanup-tag || true

      - name: Create GitHub Release on browser-extension tag
        env:
          GH_TOKEN: ${{ secrets.PERSON_ACCESS_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          gh release create browser-extension \
            release/media-saber-tools-chrome.zip \
            release/media-saber-tools-chrome.crx \
            release/media-saber-tools-chrome.crx.zip \
            release/media-saber-tools-edge.zip \
            release/media-saber-tools-edge.crx \
            release/media-saber-tools-edge.crx.zip \
            release/media-saber-tools-firefox.zip \
            release/media-saber-tools-firefox-mv3.zip \
            release/media-saber-tools-safari.zip \
            --title "${VERSION}" \
            --notes-file release_notes.md \
            --repo "${{ github.repository }}"
